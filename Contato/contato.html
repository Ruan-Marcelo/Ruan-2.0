<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruan Marcelo | Portfólio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../CSS/style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/ionicons@5.5.2/dist/ionicons.js"></script>
  </head>
  <body>
    <header>
      <div class="logo">RUAN MARCELO</div>

      <nav>
        <ul>
          <li><a href="../index.html">Início</a></li>
          <li><a href="../sobre.html">Sobre</a></li>
          <li class="active"><a href="../Contato/contato.html">Contato</a></li>
        </ul>
      </nav>

      <div class="toggle-btn" id="theme-toggle">
        <span class="text" id="mode-text">OFF</span>
        <div class="circle"></div>
      </div>
    </header>

    <main>
      <section class="contato-container">
        <div class="contato-img">
          <img src="../IMG/imgContato.png" alt="Ilustração programador" />
        </div>

        <div class="form-area">
          <h1 class="titulo-contato">Entre em contato</h1>

          <form class="form" id="contact-form">
            <label>Nome</label>
            <input type="text" name="name" placeholder="Nome:" required />

            <label>Email</label>
            <input
              type="email"
              name="email"
              placeholder="Seu melhor E-mail:"
              required
            />

            <label>Mensagem</label>
            <textarea
              name="message"
              placeholder="Digite sua mensagem:"
              required
            ></textarea>

            <!-- Futura atualização para detectar bots -->
            <!-- <div class="honeypot">
              <label>Não preencha este campo</label>
              <input type="text" name="website" />
            </div> -->

            <input type="hidden" name="time" id="time" />

            <button type="submit">
              <ion-icon name="paper-plane-outline"></ion-icon>
              ENVIAR MENSAGEM
            </button>
          </form>
        </div>
        <div id="alert-msg" class="alert">Mensagem enviada com sucesso!</div>
      </section>

      <div class="socials">
        <a href="#"><ion-icon name="logo-linkedin"></ion-icon></a>
        <a href="#"><ion-icon name="logo-github"></ion-icon></a>
      </div>

      <div class="website">
        <a href="https://www.zruanzito.com.br" target="_blank" class="site">
          zruanzito.com.br
        </a>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="../JS/scripts.js"></script>
  </body>
</html>
